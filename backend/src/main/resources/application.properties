server.port=5001
spring.application.name=aegisshield-endorsement

# Pretty-print JSON responses in dev
spring.jackson.serialization.indent_output=true
spring.jackson.default-property-inclusion=non_null

# H2 Datasource Configuration
spring.datasource.url=jdbc:h2:mem:endorsementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=KEY,VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Config
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS is handled in code via WebMvcConfigurer
logging.level.com.aegisshield=DEBUG
